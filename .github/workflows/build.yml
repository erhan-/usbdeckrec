name: Build USB DeckRec

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY || '' }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Install build tools
        run: sudo apt-get install -y -qq ninja-build

      - name: Clean stale CMake cache
        run: rm -rf app/.cxx

      - name: Run tests
        run: gradle test --build-cache --parallel --no-daemon

      - name: Build APK
        run: gradle assembleDebug --build-cache --parallel --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
